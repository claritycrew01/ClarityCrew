name: claritycrew
description: ClarityCrew - A calm, accessible learning platform for neurodivergent students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.14.0
  provider: ^6.1.1
  go_router: ^14.0.1
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.22
  shimmer: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.2.2
  http: ^1.2.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - web/icons/
