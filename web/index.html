<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ClarityCrew - A calm, accessible learning platform for neurodivergent students.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4F6DB4">
  <title>ClarityCrew</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/flutter_service_worker.js');
      });
    }
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #FAFAFA;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #F8F9FF 0%, #E8ECF8 100%);
    }
    #loading h1 {
      font-size: 2rem;
      color: #4F6DB4;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    #loading p {
      color: #5A6072;
      font-size: 1rem;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #E0E4F0;
      border-top: 3px solid #4F6DB4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .loader { animation-duration: 2s; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    <h1>ClarityCrew</h1>
    <p>Preparing your learning space...</p>
  </div>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      var loading = document.getElementById('loading');
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: '1.0.0',
        },
        onEntrypointLoaded: function(engineInitializer) {
          loading.remove();
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
